<head>
<title>Grid</title>
<style>
    .grid {
        display: grid;
        grid-template-rows: 50px 50px 50px 50px 50px 50px 50px;
        grid-template-columns: 50px 50px 50px 50px 50px 50px 50px;
        grid-template-areas: "y1 r b1 b1 b2 b2 b3"
                            "y1 r b4 b4 b2 b2 b3"
                            "y1 b5 b5 b6 b2 b2 b3"
                            "b7 b7 b7 b8 b8 b y2"
                            "b7 b7 b7 b8 b8 b y2"
                            "b7 b7 b7 b9 b9 b10 b10"
                            "b11 b11 b11 b12 b12 b10 b10";
    }
    .grid *{   
        border: 3px solid black; 
    }

    .y {grid-area: y1; background-color: yellow}
    .y1 {grid-area: y2;background-color: yellow}
    .r {grid-area: r; background-color:red}
    .b1{grid-area: b1;}
    .b2{grid-area: b2;}
    .b3{grid-area: b3;}
    .b4{grid-area: b4;}
    .b5{grid-area: b5;}
    .b6{grid-area: b6;}
    .b7{grid-area: b7;}
    .b8{grid-area: b8;}
    .b9{grid-area: b9;}
    .b10{grid-area: b10;}
    .b11{grid-area: b11;}
    .b12{grid-area: b12;}
    .b{grid-area: b; background-color: blue;}


</style>
</head>
<body>
<div class="grid">
    <div class="y"></div>
    <div class="y1"></div>
    <div class="r"></div>
    <div class="b1"></div>
    <div class="b2"></div>
    <div class="b3"></div>
    <div class="b4"></div>
    <div class="b5"></div>
    <div class="b6"></div>
    <div class="b7"></div>
    <div class="b8"></div>
    <div class="b9"></div>
    <div class="b10"></div>
    <div class="b11"></div>
    <div class="b12"></div>
    <div class="b"></div>
</div>
</body>
